extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  # ── Nhận tất cả telemetry từ OTel Agents trên 3 EKS nodes ──
  # Agents push traces + app metrics + node_exporter metrics qua OTLP
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 32
      http:
        endpoint: 0.0.0.0:4318

  # ── Self-monitoring của collector này ──
  prometheus/self:
    config:
      scrape_configs:
        - job_name: "otel-collector-self"
          scrape_interval: 10s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch:
    timeout: 5s
    send_batch_size: 8192
    send_batch_max_size: 16384

  # t3.medium 4GB RAM — giới hạn tại 400MiB
  memory_limiter:
    limit_mib: 400
    spike_limit_mib: 100
    check_interval: 5s

  attributes/normalize:
    actions:
      - key: cluster
        value: "microservices-perf"
        action: upsert

  filter/drop_unnecessary:
    error_mode: ignore
    metrics:
      metric:
        - 'IsMatch(name, "otelcol_.*_capacity")'
        - 'IsMatch(name, "otelcol_processor_dropped_.*")'
        - 'name == "otelcol_exporter_queue_capacity"'

exporters:
  prometheusremotewrite:
    endpoint: "http://victoriametrics:8428/api/v1/write"
    tls:
      insecure: true
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 60s
      max_elapsed_time: 300s
    external_labels:
      cluster: "microservices-perf"
      environment: "production"
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: normal

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/normalize, batch]
      exporters: [debug]

    metrics:
      receivers: [otlp, prometheus/self]
      processors: [memory_limiter, attributes/normalize, filter/drop_unnecessary, batch]
      exporters: [prometheusremotewrite]

  telemetry:
    logs:
      level: info
      output_paths: ["stdout"]
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
