# ============================================================
# datasources.yaml — Grafana provisioning
# Mount: /etc/grafana/provisioning/datasources/
# ============================================================

apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    uid: "victoriametrics-ds"
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
      incrementalQuerying: false
      prometheusVersion: "2.40.0"
    version: 1
