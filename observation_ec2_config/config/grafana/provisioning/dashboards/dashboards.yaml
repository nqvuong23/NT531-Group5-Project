apiVersion: 1
providers:
  - name: "microservices-perf"
    orgId: 1
    folder: "Microservices Performance"
    folderUid: "microservices-perf"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
