networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  victoriametrics-data:
    driver: local
  grafana-data:
    driver: local

services:

  # ============================================================
  # OTel Collector — Central tier
  # Nhận OTLP từ OTel Agents trên 3 EKS nodes
  # Export metrics → VictoriaMetrics
  # ============================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.143.0
    container_name: otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otel-collector/config.yaml
    volumes:
      # FIX: đường dẫn chính xác khớp với cấu trúc thư mục
      - ./config/otel-collector-config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC — nhận từ EKS agents (mở trong Security Group)
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Self-metrics (Prometheus format)
      - "13133:13133"  # Health check
    networks:
      - monitoring
    depends_on:
      victoriametrics:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=5", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - GOGC=80
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================
  # VictoriaMetrics v1.101.0 — Time-series database
  # ============================================================
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.139.0
    container_name: victoriametrics
    restart: unless-stopped
    command:
      - --storageDataPath=/storage
      - --retentionPeriod=30d
      - --httpListenAddr=:8428
      - --maxLabelsPerTimeseries=40
      - --storage.maxHourlySeries=100000
      - --search.maxQueryDuration=60s
      - --search.maxUniqueTimeseries=100000
      - --dedup.minScrapeInterval=1s
      - --selfScrapeInterval=10s
    volumes:
      - victoriametrics-data:/storage
    ports:
      - "8428:8428"    # HTTP API + UI (mở trong Security Group cho VPC + grafana_allowed_cidrs)
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=5", "-q", "http://localhost:8428/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================
  # Grafana v11.0.0 — Dashboard + Alerting
  # ============================================================
  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_PATHS_DATA=/var/lib/grafana
      - GF_DATAPROXY_TIMEOUT=60
      - GF_DATAPROXY_DIAL_TIMEOUT=10
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"    # Grafana UI (mở trong Security Group cho grafana_allowed_cidrs)
    networks:
      - monitoring
    depends_on:
      victoriametrics:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=5 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
