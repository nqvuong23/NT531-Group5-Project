# ============================================================
# docker-compose.yml — EC2 Monitoring Stack
# OTel Collector (central) + VictoriaMetrics + Grafana
#
# Cấu trúc thư mục cần có TRƯỚC KHI chạy:
#
#   monitoring/ec2/
#   ├── docker-compose.yml          ← file này
#   ├── .env                        ← copy từ .env.example
#   └── config/
#       ├── otel-collector-config.yaml
#       └── grafana/
#           ├── provisioning/
#           │   ├── datasources/
#           │   │   └── datasources.yaml
#           │   ├── dashboards/
#           │   │   └── dashboards.yaml
#           │   └── alerting/
#           │       └── alert-rules.yaml
#           └── dashboards/
#               └── microservices-perf.json
#
# CÁCH DÙNG (chạy trên EC2 monitoring):
#   cd monitoring/ec2
#   cp .env.example .env          # chỉnh password Grafana
#   docker compose up -d
#   docker compose ps             # verify
# ============================================================

version: "3.9"

networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  victoriametrics-data:
    driver: local
  grafana-data:
    driver: local

services:

  # ============================================================
  # OTel Collector — Central tier
  # Nhận OTLP từ OTel Agents trên 3 EKS nodes
  # Export metrics → VictoriaMetrics
  # ============================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otel-collector/config.yaml
    volumes:
      # FIX: đường dẫn chính xác khớp với cấu trúc thư mục
      - ./config/otel-collector-config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC — nhận từ EKS agents (mở trong Security Group)
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Self-metrics (Prometheus format)
      - "13133:13133"  # Health check
    networks:
      - monitoring
    depends_on:
      victoriametrics:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      - GOGC=80
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================
  # VictoriaMetrics v1.101.0 — Time-series database
  # ============================================================
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    container_name: victoriametrics
    restart: unless-stopped
    command:
      - --storageDataPath=/storage
      - --retentionPeriod=30d
      - --httpListenAddr=:8428
      - --maxLabelsPerTimeseries=40
      # - --maxHourlySeries=100000
      - --search.maxQueryDuration=60s
      - --search.maxUniqueTimeseries=100000
      # FIX: dedup interval = scrape interval của Node Exporter (1s)
      # Tránh duplicate khi nhiều agent cùng report metric của 1 node
      - --dedup.minScrapeInterval=1s
      - --selfScrapeInterval=10s
    volumes:
      - victoriametrics-data:/storage
    ports:
      - "8428:8428"    # HTTP API + UI (mở trong Security Group cho VPC + grafana_allowed_cidrs)
    networks:
      - monitoring
    # healthcheck:
    #   test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8428/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================
  # Grafana v11.0.0 — Dashboard + Alerting
  # ============================================================
  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_PATHS_DATA=/var/lib/grafana
      - GF_DATAPROXY_TIMEOUT=60
      - GF_DATAPROXY_DIAL_TIMEOUT=10
    volumes:
      - grafana-data:/var/lib/grafana
      # FIX: đường dẫn provisioning đầy đủ theo cấu trúc thư mục
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard JSON files
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"    # Grafana UI (mở trong Security Group cho grafana_allowed_cidrs)
    networks:
      - monitoring
    depends_on:
      victoriametrics:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
