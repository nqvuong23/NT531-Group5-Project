# ============================================================
# otel-agent-daemonset.yaml
# OpenTelemetry Collector Agent — DaemonSet trên tất cả EKS nodes
# Version: otel/opentelemetry-collector-contrib:0.101.0
#
# FIXES so với bản cũ:
#   - regex: dùng '|-' thay vì '>-' (>- gộp newline thành space, phá vỡ regex)
#   - OTEL_COLLECTOR_ENDPOINT inject qua ConfigMap monitoring-endpoints
# ============================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-agent
  namespace: monitoring
  labels:
    app: otel-agent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-agent
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, nodes/stats, pods, endpoints, services, namespaces]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [replicasets, deployments, daemonsets, statefulsets]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-agent
subjects:
  - kind: ServiceAccount
    name: otel-agent
    namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-agent

---
# ConfigMap: monitoring-endpoints
# Cập nhật otel_collector_endpoint sau khi biết IP của Observation EC2.
# setup.sh sẽ tự động patch giá trị này.
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-endpoints
  namespace: monitoring
  labels:
    component: observability
data:
  # setup.sh sẽ patch giá trị này với private IP thực của EC2 monitoring
  otel_collector_endpoint: "PLACEHOLDER:4317"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-agent-config
  namespace: monitoring
  labels:
    app: otel-agent
data:
  otel-agent-config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777

    receivers:
      # ---- OTLP: nhận traces + metrics từ Go microservices ----
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # ---- Prometheus: scrape Node Exporter trên cùng node ----
      # FIX: regex dùng '|-' (literal block, giữ newline) thay vì '>-'
      # '>-' gộp newlines thành spaces → phá vỡ alternation regex
      prometheus/node_exporter:
        config:
          global:
            scrape_interval: 1s
            scrape_timeout: 1s
          scrape_configs:
            - job_name: "node-exporter"
              static_configs:
                - targets:
                    - "${env:HOST_IP}:9100"
              relabel_configs:
                - target_label: node
                  replacement: "${env:K8S_NODE_NAME}"
                - target_label: job
                  replacement: "node-exporter"
              metric_relabel_configs:
                - source_labels: [__name__]
                  # FIX: dùng literal string thay vì folded scalar
                  regex: "node_netstat_Tcp_RetransSegs|node_network_receive_packets_total|node_network_receive_drop_total|node_network_transmit_packets_total|node_network_transmit_drop_total|node_cpu_seconds_total|node_context_switches_total|node_netstat_TcpExt_.*|node_tcpstat_.*|node_memory_MemAvailable_bytes|node_memory_MemTotal_bytes|node_load1|node_load5|node_network_receive_bytes_total|node_network_transmit_bytes_total|node_filesystem_avail_bytes|node_filesystem_size_bytes"
                  action: keep

      # ---- Kubelet stats ----
      kubeletstats:
        collection_interval: 10s
        auth_type: "serviceAccount"
        endpoint: "https://${env:HOST_IP}:10250"
        insecure_skip_verify: true
        metric_groups: [node, pod, container]
        extra_metadata_labels: [container.id]

      # ---- Host metrics ----
      hostmetrics:
        collection_interval: 10s
        scrapers:
          cpu:
            metrics:
              system.cpu.utilization:
                enabled: true
          memory:
            metrics:
              system.memory.utilization:
                enabled: true
          network:
          disk:
          filesystem:
          load:
          processes:
          paging:

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
        send_batch_max_size: 2048

      memory_limiter:
        limit_mib: 200
        spike_limit_mib: 50
        check_interval: 5s

      resourcedetection:
        detectors: [env, ec2, eks]
        timeout: 10s
        override: false

      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        filter:
          node_from_env_var: K8S_NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      attributes/add_node:
        actions:
          - key: k8s.node.name
            value: "${env:K8S_NODE_NAME}"
            action: upsert
          - key: cluster
            value: "microservices-perf"
            action: upsert

    exporters:
      otlp/central:
        endpoint: "${env:OTEL_COLLECTOR_ENDPOINT}"
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    service:
      extensions: [health_check, pprof]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, k8sattributes, attributes/add_node, batch]
          exporters: [otlp/central]

        metrics/app:
          receivers: [otlp, kubeletstats, hostmetrics]
          processors: [memory_limiter, resourcedetection, k8sattributes, attributes/add_node, batch]
          exporters: [otlp/central]

        # Node Exporter metrics — pipeline riêng giữ interval 1s
        metrics/node_exporter:
          receivers: [prometheus/node_exporter]
          processors: [memory_limiter, attributes/add_node, batch]
          exporters: [otlp/central]

      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  namespace: monitoring
  labels:
    app: otel-agent
    component: observability
spec:
  selector:
    matchLabels:
      app: otel-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: otel-agent
        component: observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: otel-agent
      tolerations:
        - key: "role"
          operator: "Equal"
          value: "gateway"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
      terminationGracePeriodSeconds: 30
      containers:
        - name: otel-agent
          image: otel/opentelemetry-collector-contrib:latest
          command:
            - /otelcol-contrib
            - --config=/conf/otel-agent-config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              hostPort: 4317      # Expose trên node IP để microservices gửi OTLP
            - name: otlp-http
              containerPort: 4318
              hostPort: 4318
            - name: health
              containerPort: 13133
            - name: self-metrics
              containerPort: 8888
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: K8S_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Lấy endpoint OTel Collector EC2 từ ConfigMap
            # setup.sh sẽ patch ConfigMap này với private IP thực
            - name: OTEL_COLLECTOR_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: monitoring-endpoints
                  key: otel_collector_endpoint
          volumeMounts:
            - name: otel-agent-config
              mountPath: /conf
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: otel-agent-config
          configMap:
            name: otel-agent-config
            items:
              - key: otel-agent-config.yaml
                path: otel-agent-config.yaml

---
apiVersion: v1
kind: Service
metadata:
  name: otel-agent
  namespace: monitoring
  labels:
    app: otel-agent
spec:
  type: ClusterIP
  selector:
    app: otel-agent
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: self-metrics
      port: 8888
      targetPort: 8888
